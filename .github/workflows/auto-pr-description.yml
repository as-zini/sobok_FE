name: Auto PR Description

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  auto-description:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate PR Description
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            // 이미 내용이 있으면 덮어쓰지 않음
            if (pr.body && pr.body.trim().length > 0) {
              console.log('PR description already exists, skipping.');
              return;
            }

            // 브랜치 이름에서 이슈 번호 추출 (예: chore/107-setting-enforce → 107)
            const branch = pr.head.ref;
            const issueMatch = branch.match(/\/(\d+)-/);
            const issueNumber = issueMatch ? issueMatch[1] : null;

            // 커밋 목록 가져오기
            const { data: commits } = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });

            // 커밋을 카테고리별로 분류
            const categories = {
              feat: { emoji: '✨', title: '새 기능', items: [] },
              fix: { emoji: '🐛', title: '버그 수정', items: [] },
              chore: { emoji: '🔧', title: '설정/환경', items: [] },
              refactor: { emoji: '♻️', title: '리팩토링', items: [] },
              style: { emoji: '💄', title: '스타일', items: [] },
              docs: { emoji: '📝', title: '문서', items: [] },
              other: { emoji: '📌', title: '기타', items: [] },
            };

            for (const commit of commits) {
              const msg = commit.commit.message.split('\n')[0];
              const match = msg.match(/^(\w+):\s*(.+)/);
              if (match) {
                const [, type, desc] = match;
                const key = categories[type] ? type : 'other';
                categories[key].items.push(`- ${desc} (\`${commit.sha.slice(0, 7)}\`)`);
              } else {
                categories.other.items.push(`- ${msg} (\`${commit.sha.slice(0, 7)}\`)`);
              }
            }

            // PR Description 생성
            let body = '';

            // 1. 연관된 이슈
            body += `## � 연관된 이슈\n\n`;
            if (issueNumber) {
              body += `- closes #${issueNumber}\n`;
            } else {
              body += `- \n`;
            }
            body += `\n`;

            // 2. 작업 내용
            body += `## �📋 작업 내용\n\n`;
            for (const [, cat] of Object.entries(categories)) {
              if (cat.items.length > 0) {
                body += `### ${cat.emoji} ${cat.title}\n${cat.items.join('\n')}\n\n`;
              }
            }

            // 3. 작업 결과
            body += `## 📸 작업 결과\n\n\n\n`;

            // 4. 참고 사항
            body += `## 💬 참고 사항\n\n\n`;

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: body,
            });
